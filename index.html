  for (const p of ENGLISH_PHASES) {

  const target = new Date(UK_DEPARTURE + 'T00:00:00');
  const now = new Date(todayStr() + 'T00:00:00');
  return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
};

const defaultState = {
  daily: {},
  aga: {
    clinicBooked: false,
    clinicVisited: false,
    finasterideStarted: false,
    minoxidilStarted: false,
    photoLogStarted: false,
    startDate: null,
  },
  monthly: {},
  reviews: {},
  hairPhotos: [],
};

// ======= Main App =======
function LifeOS() {
  const [state, setState] = useState(defaultState);
  const [view, setView] = useState('today');
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        const parsed = JSON.parse(stored);
        setState({ ...defaultState, ...parsed, aga: { ...defaultState.aga, ...(parsed.aga || {}) } });
      }
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    const t = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      catch (e) { console.error('save failed', e); }
    }, 250);
    return () => clearTimeout(t);
  }, [state, loaded]);

  if (!loaded) {
    return <div style={{ background: COLORS.bg, color: COLORS.muted, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'system-ui' }}>
      <div style={{ fontFamily: 'monospace', fontSize: '0.75rem', letterSpacing: '0.3em' }}>LOADING...</div>
    </div>;
  }

  return (
    <div style={{ background: COLORS.bg, color: COLORS.text, minHeight: '100vh', paddingBottom: '5rem', fontFamily: '"IBM Plex Sans JP", system-ui, sans-serif', fontWeight: 300, letterSpacing: '0.02em', WebkitFontSmoothing: 'antialiased' }}>
      <FontImport />
      <div style={{ maxWidth: '720px', margin: '0 auto' }}>
        {view === 'today' && <TodayView state={state} setState={setState} />}
        {view === 'trend' && <TrendView state={state} setState={setState} />}
        {view === 'hair' && <HairView state={state} setState={setState} />}
        {view === 'wealth' && <WealthView state={state} setState={setState} />}
        {view === 'plan' && <PlanView state={state} setState={setState} />}
      </div>
      <BottomNav view={view} setView={setView} />
    </div>
  );
}

// ======= TODAY VIEW =======
function TodayView({ state, setState }) {
  const today = todayStr();
  const dateObj = new Date();
  const data = state.daily[today] || {};
  const phase = getPhase(today);
  const isTrain = isTrainingDay(dateObj);
  const [editingDate, setEditingDate] = useState(null);
  const [shareOpen, setShareOpen] = useState(false);

  const update = (key, value) => {
    setState(prev => ({
      ...prev,
      daily: { ...prev.daily, [today]: { ...prev.daily[today], [key]: value } }
    }));
  };

  const calcStreak = (predicate) => {
    let streak = 0;
    const cur = new Date();
    for (let i = 0; i < 365; i++) {
      const key = fmt(cur);
      const d = state.daily[key];
      if (!d || !predicate(d)) break;
      streak++;
      cur.setDate(cur.getDate() - 1);
    }
    return streak;
  };

  const hairAMStreak = useMemo(() => calcStreak(d => d.hairAM), [state.daily]);
  const hairPMStreak = useMemo(() => calcStreak(d => d.hairPM), [state.daily]);
  const sleepStreak = useMemo(() => calcStreak(d => (d.sleep || 0) >= 7), [state.daily]);
  const englishStreak = useMemo(() => calcStreak(d => (d.english || 0) > 0), [state.daily]);

  // weekly counts (Sun-Sat current week)
  const calcThisWeekCount = (predicate) => {
    let count = 0;
    const now = new Date();
    const sunday = new Date(now);
    sunday.setDate(now.getDate() - now.getDay());
    sunday.setHours(0, 0, 0, 0);
    const todayDate = new Date();
    todayDate.setHours(23, 59, 59, 999);
    for (let i = 0; i < 7; i++) {
      const d = new Date(sunday);
      d.setDate(sunday.getDate() + i);
      if (d > todayDate) break;
      const key = fmt(d);
      const data = state.daily[key];
      if (data && predicate(data)) count++;
    }
    return count;
  };

  const strengthThisWeek = useMemo(() => calcThisWeekCount(d => d.strength), [state.daily]);
  const movementThisWeek = useMemo(() => calcThisWeekCount(d => d.movement), [state.daily]);

  // weekly aggregates for sharing
  const weeklyAgg = useMemo(() => {
    let totalEnglish = 0, sleepSum = 0, sleepCount = 0;
    let hairAMCount = 0, hairPMCount = 0, daysCount = 0;
    const now = new Date();
    const sunday = new Date(now);
    sunday.setDate(now.getDate() - now.getDay());
    sunday.setHours(0, 0, 0, 0);
    const todayDate = new Date();
    todayDate.setHours(23, 59, 59, 999);
    for (let i = 0; i < 7; i++) {
      const d = new Date(sunday);
      d.setDate(sunday.getDate() + i);
      if (d > todayDate) break;
      daysCount++;
      const key = fmt(d);
      const data = state.daily[key];
      if (data) {
        totalEnglish += data.english || 0;
        if ((data.sleep || 0) > 0) { sleepSum += data.sleep; sleepCount++; }
        if (data.hairAM) hairAMCount++;
        if (data.hairPM) hairPMCount++;
      }
    }
    return {
      totalEnglish,
      avgSleep: sleepCount ? (sleepSum / sleepCount).toFixed(1) : null,
      hairAMRate: daysCount ? Math.round(hairAMCount / daysCount * 100) : 0,
      hairPMRate: daysCount ? Math.round(hairPMCount / daysCount * 100) : 0,
    };
  }, [state.daily]);

  // elapsed days from START_DATE
  const elapsedFromStart = Math.max(0, daysSince(START_DATE) || 0);

  // progress
  const habitsComplete = [
    data.hairAM,
    data.hairPM,
    data.english > 0,
    (data.strength || data.movement),
    data.sleep > 0
  ].filter(Boolean).length;
  const totalHabits = 5;
  const progress = Math.round((habitsComplete / totalHabits) * 100);

  // current week (Sun → Sat)
  const currentWeek = useMemo(() => {
    const arr = [];
    const now = new Date();
    const sunday = new Date(now);
    sunday.setDate(now.getDate() - now.getDay()); // back to Sunday
    sunday.setHours(0, 0, 0, 0);

    const todayDate = new Date();
    todayDate.setHours(0, 0, 0, 0);

    for (let i = 0; i < 7; i++) {
      const d = new Date(sunday);
      d.setDate(sunday.getDate() + i);
      const key = fmt(d);
      const data = state.daily[key] || {};
      const score = [data.hairAM, data.hairPM, data.english > 0, (data.strength || data.movement), data.sleep > 0].filter(Boolean).length;
      const isToday = key === today;
      const isFuture = d > todayDate;
      arr.push({ date: new Date(d), score, isToday, isFuture });
    }
    return arr;
  }, [state.daily, today]);

  return (
    <div style={{ padding: '1.5rem 1.25rem 0' }}>

      <CountdownBanner />

      {/* Header */}
      <div style={{ marginBottom: '1.5rem' }}>
        <div className="mono" style={{ fontSize: '0.65rem', letterSpacing: '0.3em', color: COLORS.muted, marginBottom: '0.4rem' }}>
          LIFE OS — TODAY
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: '0.75rem', flexWrap: 'wrap' }}>
          <div className="serif" style={{ fontSize: '2rem', letterSpacing: '0.04em', fontWeight: 500 }}>
            {dateObj.getMonth() + 1}<span style={{ color: COLORS.muted }}>月</span>{dateObj.getDate()}<span style={{ color: COLORS.muted }}>日</span>
          </div>
          <div className="mono" style={{ fontSize: '0.75rem', color: COLORS.accent, letterSpacing: '0.2em' }}>
            {dayJP(dateObj)} · {phase.label} · {phase.target}min{isTrain ? ' · TRAIN' : ''}
          </div>
        </div>
      </div>

      {/* Progress ring */}
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, padding: '1.25rem', marginBottom: '1.5rem', display: 'flex', alignItems: 'center', gap: '1rem' }}>
        <ProgressRing value={progress} />
        <div style={{ flex: 1 }}>
          <div className="mono" style={{ fontSize: '0.65rem', letterSpacing: '0.25em', color: COLORS.muted, marginBottom: '0.25rem' }}>TODAY</div>
          <div className="serif" style={{ fontSize: '1.5rem', fontWeight: 500 }}>{habitsComplete} / {totalHabits}</div>
          <div style={{ fontSize: '0.78rem', color: COLORS.muted, marginTop: '0.25rem' }}>
            {progress === 100 ? '完璧。今日は積み上げた。' : progress >= 60 ? 'いい流れ。あと一歩。' : progress >= 20 ? 'まだ取り戻せる。' : '何か一つだけでも。'}
          </div>
        </div>
      </div>

      {/* Elapsed since start */}
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0.7rem 1rem',
        background: COLORS.surface,
        border: `1px solid ${COLORS.border}`,
        marginBottom: '0.5rem',
      }}>
        <div className="mono" style={{ fontSize: '0.6rem', letterSpacing: '0.25em', color: COLORS.muted }}>
          START → 2026.05.08
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: '0.3rem' }}>
          <div className="serif" style={{ fontSize: '1.5rem', fontWeight: 500, color: COLORS.accent, lineHeight: 1 }}>
            {elapsedFromStart}
          </div>
          <div className="mono" style={{ fontSize: '0.65rem', color: COLORS.muted, letterSpacing: '0.15em' }}>
            日経過
          </div>
        </div>
      </div>

      {/* Streaks (consecutive) */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '0.5rem', marginBottom: '0.5rem' }}>

      </div>

      {/* Weekly counts */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '0.5rem', marginBottom: '1.5rem' }}>

        <WeeklyCard icon={<Activity size={14} />} label="運動 週" count={movementThisWeek} target={1} />
      </div>

      {/* Habits */}
      <SectionLabel>HABITS</SectionLabel>

      <HabitTap
        active={!!data.hairAM}
        onTap={() => update('hairAM', !data.hairAM)}

      <HabitTap
        active={!!data.strength}

        icon={<Dumbbell size={18} />}
        label="筋トレ"
        sub={isTrain ? "本格トレ日 (月火金) · 週3が目標" : "週3が目標"}

      />

      <HabitTap

      <HabitTap

        rows={3}
        style={{

        {currentWeek.map((d, i) => (

#LifeOS`;

function ProgressRing({ value }) {
  const r = 28;
  const c = 2 * Math.PI * r;
  const offset = c - (value / 100) * c;
  return (
    <svg width="68" height="68" viewBox="0 0 68 68">
      <circle cx="34" cy="34" r={r} fill="none" stroke={COLORS.border} strokeWidth="3" />
      <circle
        cx="34" cy="34" r={r} fill="none"
        stroke={COLORS.accent} strokeWidth="3"
        strokeDasharray={c} strokeDashoffset={offset}
        transform="rotate(-90 34 34)"
        strokeLinecap="round"
        style={{ transition: 'stroke-dashoffset 0.6s ease' }}
      />
      <text x="34" y="38" textAnchor="middle" fill={COLORS.text} fontSize="14" fontFamily="JetBrains Mono">

      </text>
    </svg>
  );
}

function TrendView({ state, setState }) {
  const month = monthStr();

  // 30 days
  const last30 = useMemo(() => {
    const arr = [];
    const cur = new Date();
    cur.setDate(cur.getDate() - 29);
    for (let i = 0; i < 30; i++) {
      const key = fmt(cur);
      const d = state.daily[key] || {};
      const score = [d.hairAM, d.hairPM, d.english > 0, (d.strength || d.movement), d.sleep > 0].filter(Boolean).length;
      arr.push({ date: new Date(cur), score, data: d });
      cur.setDate(cur.getDate() + 1);
    }
    return arr;
  }, [state.daily]);

  // current month aggregates
  const monthData = useMemo(() => {
    const monthDays = Object.entries(state.daily).filter(([k]) => k.startsWith(month));
    const sleeps = monthDays.map(([, d]) => d.sleep || 0).filter(v => v > 0);
    const englishMins = monthDays.reduce((s, [, d]) => s + (d.english || 0), 0);
    const strengthCount = monthDays.filter(([, d]) => d.strength).length;
    const movementCount = monthDays.filter(([, d]) => d.movement).length;
    const hairAMRate = monthDays.length ? Math.round(monthDays.filter(([, d]) => d.hairAM).length / monthDays.length * 100) : 0;
    const hairPMRate = monthDays.length ? Math.round(monthDays.filter(([, d]) => d.hairPM).length / monthDays.length * 100) : 0;
    const avgSleep = sleeps.length ? (sleeps.reduce((a, b) => a + b, 0) / sleeps.length).toFixed(1) : '—';
    return { englishMins, strengthCount, movementCount, hairAMRate, hairPMRate, avgSleep, daysLogged: monthDays.length };
  }, [state.daily, month]);

  return (
    <div style={{ padding: '1.5rem 1.25rem 0' }}>
      <div className="mono" style={{ fontSize: '0.65rem', letterSpacing: '0.3em', color: COLORS.muted, marginBottom: '0.4rem' }}>
        LIFE OS — TREND
      </div>
      <div className="serif" style={{ fontSize: '2rem', letterSpacing: '0.04em', fontWeight: 500, marginBottom: '1.5rem' }}>
        過去 30 日
      </div>

      {/* Heatmap */}
      <SectionLabel>DAILY SCORE HEATMAP</SectionLabel>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(10, 1fr)', gap: '0.25rem', marginBottom: '2rem' }}>
        {last30.map((d, i) => {
          const intensity = d.score / 5;
          return (
            <div key={i} style={{
              aspectRatio: '1',
              background: d.score === 0 ? COLORS.surface : `rgba(212, 165, 116, ${0.15 + intensity * 0.85})`,
              border: `1px solid ${COLORS.border}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: '0.55rem', fontFamily: 'JetBrains Mono',
              color: intensity > 0.5 ? COLORS.bg : COLORS.muted,
            }}>
              {d.date.getDate()}
            </div>
          );
        })}
      </div>

      <SectionLabel>{month} 月次サマリー</SectionLabel>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.5rem', marginBottom: '1.5rem' }}>
        <StatCard label="平均睡眠" value={monthData.avgSleep} unit="h" />
        <StatCard label="記録日数" value={monthData.daysLogged} unit="日" />
        <StatCard label="筋トレ" value={monthData.strengthCount} unit="回" />
        <StatCard label="運動" value={monthData.movementCount} unit="回" />
        <StatCard label="英語合計" value={monthData.englishMins} unit="min" />
        <StatCard label="朝ヘアケア" value={monthData.hairAMRate} unit="%" />
        <StatCard label="夜ヘアケア" value={monthData.hairPMRate} unit="%" />
      </div>

      {/* Monthly Review */}
      <SectionLabel>月次レビュー (4 質問)</SectionLabel>
      <MonthlyReview state={state} setState={setState} month={month} />

      <div style={{ height: '2rem' }} />
    </div>
  );
}

function StatCard({ label, value, unit }) {
  return (
    <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, padding: '1rem' }}>
      <div className="mono" style={{ fontSize: '0.6rem', letterSpacing: '0.25em', color: COLORS.muted, marginBottom: '0.5rem' }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: '0.3rem' }}>
        <div className="serif" style={{ fontSize: '1.7rem', fontWeight: 500, color: COLORS.accent }}>{value}</div>
        <div className="mono" style={{ fontSize: '0.7rem', color: COLORS.muted }}>{unit}</div>
      </div>
    </div>
  );
}

function MonthlyReview({ state, setState, month }) {
  const review = state.reviews?.[month] || {};
  const questions = [
    'Q1. 今月、最も自分を進めた一手は？',
    'Q2. 崩れた習慣は何で、なぜ崩れた？',
    'Q3. 来月、たった一つだけ変えるなら？',
    'Q4. 「2027.04 の自分」から見て、今月は？',
  ];

  const updateAnswer = (qKey, value) => {
    setState(prev => ({
      ...prev,
      reviews: {
        ...prev.reviews,
        [month]: {
          ...(prev.reviews?.[month] || {}),
          [qKey]: value,
        }
      }
    }));
  };

  return (
    <div>
      {questions.map((q, i) => (
        <div key={i} style={{ marginBottom: '1rem' }}>
          <div style={{ fontSize: '0.85rem', color: COLORS.muted, marginBottom: '0.4rem' }}>{q}</div>
          <textarea
            value={review[`q${i + 1}`] || ''}
            onChange={(e) => updateAnswer(`q${i + 1}`, e.target.value)}
            placeholder="..."
            rows={2}
            style={{
              width: '100%',
              background: COLORS.surface,
              border: `1px solid ${COLORS.border}`,
              color: COLORS.text,
              padding: '0.7rem',
              fontSize: '0.88rem',
              fontFamily: 'inherit',
              fontWeight: 300,
              lineHeight: 1.6,
              resize: 'vertical',
            }}
          />
        </div>
      ))}
    </div>
  );
}

// ======= HAIR VIEW =======
function HairView({ state, setState }) {
  const aga = state.aga || defaultState.aga;
  const updateAGA = (key, value) => {
    setState(prev => {
      const next = { ...prev, aga: { ...prev.aga, [key]: value } };
      if ((key === 'finasterideStarted' || key === 'minoxidilStarted') && value && !prev.aga.startDate) {
        next.aga.startDate = todayStr();
      }
      return next;
    });
  };

  const photos = state.hairPhotos || [];
  const lastPhoto = photos[photos.length - 1];
  const sinceLastPhoto = lastPhoto ? daysSince(lastPhoto.date) : null;
  const sinceStart = aga.startDate ? daysSince(aga.startDate) : null;

  const addPhoto = () => {
    setState(prev => ({
      ...prev,
      hairPhotos: [...(prev.hairPhotos || []), { date: todayStr() }]
    }));
  };

  const removePhoto = (date) => {
    setState(prev => ({
      ...prev,
      hairPhotos: (prev.hairPhotos || []).filter(p => p.date !== date)
    }));
  };

  // 30day routine rate
  const rates = useMemo(() => {
    const days = Object.entries(state.daily);
    const last30 = days.filter(([k]) => {
      const diff = daysSince(k);
      return diff !== null && diff >= 0 && diff < 30;
    });
    if (last30.length === 0) return { am: 0, pm: 0 };
    const am = Math.round(last30.filter(([, d]) => d.hairAM).length / last30.length * 100);
    const pm = Math.round(last30.filter(([, d]) => d.hairPM).length / last30.length * 100);
    return { am, pm };
  }, [state.daily]);

  // Total hair routine days (from start)
  const totals = useMemo(() => {
    const entries = Object.values(state.daily);
    return {
      am: entries.filter(d => d.hairAM).length,
      pm: entries.filter(d => d.hairPM).length,
      logged: entries.length,
    };
  }, [state.daily]);

  // Monthly history
  const monthlyHistory = useMemo(() => {
    const byMonth = {};
    for (const [date, data] of Object.entries(state.daily)) {
      const m = date.slice(0, 7);
      if (!byMonth[m]) byMonth[m] = { total: 0, am: 0, pm: 0 };
      byMonth[m].total++;
      if (data.hairAM) byMonth[m].am++;
      if (data.hairPM) byMonth[m].pm++;
    }
    return Object.entries(byMonth)
      .sort(([a], [b]) => b.localeCompare(a))
      .map(([month, stats]) => ({
        month,
        days: stats.total,
        amDays: stats.am,
        pmDays: stats.pm,
        amRate: Math.round(stats.am / stats.total * 100),
        pmRate: Math.round(stats.pm / stats.total * 100),
      }));
  }, [state.daily]);

  const steps = [
    { key: 'clinicBooked', label: 'AGAクリニック予約' },
    { key: 'clinicVisited', label: '初診 / 診断完了' },
    { key: 'finasterideStarted', label: 'フィナステリド開始' },
    { key: 'minoxidilStarted', label: 'ミノキシジル開始' },
    { key: 'photoLogStarted', label: '月1ログ写真スタート' },
  ];

  const progress = steps.filter(s => aga[s.key]).length;

  return (
    <div style={{ padding: '1.5rem 1.25rem 0' }}>
      <div className="mono" style={{ fontSize: '0.65rem', letterSpacing: '0.3em', color: COLORS.muted, marginBottom: '0.4rem' }}>
        LIFE OS — HAIR
      </div>
      <div className="serif" style={{ fontSize: '2rem', letterSpacing: '0.04em', fontWeight: 500, marginBottom: '1.5rem' }}>
        髪の記録
      </div>

      {/* Roadmap progress */}
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, padding: '1.25rem', marginBottom: '1.5rem' }}>
        <div className="mono" style={{ fontSize: '0.65rem', letterSpacing: '0.25em', color: COLORS.muted, marginBottom: '0.6rem' }}>ROADMAP</div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: '0.5rem', marginBottom: '0.85rem' }}>
          <div className="serif" style={{ fontSize: '2rem', fontWeight: 500, color: COLORS.accent }}>{progress}</div>
          <div className="mono" style={{ fontSize: '0.75rem', color: COLORS.muted }}>/ {steps.length}</div>
          {sinceStart !== null && (
            <div className="mono" style={{ fontSize: '0.7rem', color: COLORS.muted, marginLeft: 'auto' }}>
              治療開始から {sinceStart} 日
            </div>
          )}
        </div>
        <div style={{ height: '4px', background: COLORS.border, position: 'relative' }}>
          <div style={{
            position: 'absolute', top: 0, left: 0, height: '100%',
            width: `${(progress / steps.length) * 100}%`,
            background: COLORS.accent,
            transition: 'width 0.6s ease',
          }} />
        </div>
      </div>

      {/* Steps */}
      <SectionLabel>STEP CHECKLIST</SectionLabel>
      <div style={{ marginBottom: '2rem' }}>
        {steps.map((s, i) => (
          <button
            key={s.key}
            onClick={() => updateAGA(s.key, !aga[s.key])}
            style={{
              width: '100%',
              background: aga[s.key] ? COLORS.surface2 : COLORS.surface,
              border: `1px solid ${aga[s.key] ? COLORS.accentDim : COLORS.border}`,
              padding: '1rem 1.1rem',
              marginBottom: '0.4rem',
              textAlign: 'left',
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              gap: '0.85rem',
              color: COLORS.text,
              transition: 'all 0.15s ease',
              WebkitTapHighlightColor: 'transparent',
            }}
          >
            <div style={{
              width: '28px', height: '28px',
              background: aga[s.key] ? COLORS.accent : 'transparent',
              border: `1px solid ${aga[s.key] ? COLORS.accent : COLORS.border}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0,
              color: COLORS.bg,
            }}>
              {aga[s.key] ? <Check size={14} strokeWidth={2.5} /> : <span className="mono" style={{ fontSize: '0.7rem', color: COLORS.muted }}>{i + 1}</span>}
            </div>
            <div style={{ flex: 1, fontSize: '0.92rem', fontWeight: 500, textDecoration: aga[s.key] ? 'line-through' : 'none', textDecorationColor: COLORS.muted, opacity: aga[s.key] ? 0.6 : 1 }}>
              {s.label}
            </div>
          </button>
        ))}
      </div>

      {/* Stats */}
      <SectionLabel>過去 30 日 実行率</SectionLabel>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.5rem', marginBottom: '1rem' }}>
        <StatCard label="朝ルーティン" value={rates.am} unit="%" />
        <StatCard label="夜ルーティン" value={rates.pm} unit="%" />
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '0.5rem', marginBottom: '2rem' }}>
        <StatCard label="累計 朝" value={totals.am} unit="日" />
        <StatCard label="累計 夜" value={totals.pm} unit="日" />
        <StatCard label="記録日数" value={totals.logged} unit="日" />
      </div>

      {/* Monthly history */}
      <SectionLabel>月別履歴</SectionLabel>
      <div style={{ marginBottom: '2rem' }}>
        {monthlyHistory.length === 0 ? (
          <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, padding: '1.25rem', fontSize: '0.85rem', color: COLORS.faint, textAlign: 'center' }}>
            記録蓄積中
          </div>
        ) : (
          monthlyHistory.map(m => (
            <div key={m.month} style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, padding: '0.9rem 1.1rem', marginBottom: '0.4rem', display: 'flex', alignItems: 'center', gap: '1rem' }}>
              <div className="mono" style={{ fontSize: '0.78rem', color: COLORS.accent, letterSpacing: '0.15em', minWidth: '4.5rem' }}>
                {m.month}
              </div>
              <div className="mono" style={{ fontSize: '0.62rem', color: COLORS.muted }}>
                {m.days}日記録
              </div>
              <div style={{ flex: 1 }} />
              <div style={{ display: 'flex', gap: '1rem' }}>
                <div style={{ textAlign: 'right' }}>
                  <div className="mono" style={{ fontSize: '0.55rem', color: COLORS.muted, letterSpacing: '0.15em', marginBottom: '0.15rem' }}>朝</div>
                  <div className="serif" style={{ fontSize: '1rem', fontWeight: 500, color: m.amRate >= 70 ? COLORS.good : COLORS.text }}>
                    {m.amRate}<span style={{ fontSize: '0.6rem', color: COLORS.muted }}>%</span>
                  </div>
                  <div className="mono" style={{ fontSize: '0.55rem', color: COLORS.faint }}>{m.amDays}/{m.days}</div>
                </div>
                <div style={{ textAlign: 'right' }}>
                  <div className="mono" style={{ fontSize: '0.55rem', color: COLORS.muted, letterSpacing: '0.15em', marginBottom: '0.15rem' }}>夜</div>
                  <div className="serif" style={{ fontSize: '1rem', fontWeight: 500, color: m.pmRate >= 70 ? COLORS.good : COLORS.text }}>
                    {m.pmRate}<span style={{ fontSize: '0.6rem', color: COLORS.muted }}>%</span>
                  </div>
                  <div className="mono" style={{ fontSize: '0.55rem', color: COLORS.faint }}>{m.pmDays}/{m.days}</div>
                </div>
              </div>
            </div>
          ))
        )}
      </div>

      {/* Photo log */}
      <SectionLabel>PHOTO LOG</SectionLabel>
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, padding: '1.25rem', marginBottom: '2rem' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: photos.length > 0 ? '1rem' : 0 }}>
          <div>
            <div className="mono" style={{ fontSize: '0.62rem', letterSpacing: '0.25em', color: COLORS.muted, marginBottom: '0.3rem' }}>LAST</div>
            <div className="serif" style={{ fontSize: '1.4rem', fontWeight: 500 }}>
              {lastPhoto ? (
                <>
                  <span style={{ color: COLORS.accent }}>{sinceLastPhoto}</span>
                  <span style={{ fontSize: '0.7rem', color: COLORS.muted, marginLeft: '0.4rem' }}>日前</span>
                </>
              ) : (
                <span style={{ color: COLORS.faint }}>未記録</span>
              )}
            </div>
          </div>
          <button onClick={addPhoto}
            style={{
              background: COLORS.accent,
              color: COLORS.bg,
              border: 'none',
              padding: '0.7rem 1rem',
              fontSize: '0.78rem',
              cursor: 'pointer',
              fontFamily: 'JetBrains Mono, monospace',
              letterSpacing: '0.15em',
              display: 'flex', alignItems: 'center', gap: '0.4rem',
            }}>
            <Camera size={14} /> 撮影記録
          </button>
        </div>
        {photos.length > 0 && (
          <div style={{ paddingTop: '0.85rem', borderTop: `1px solid ${COLORS.border}` }}>
            <div className="mono" style={{ fontSize: '0.62rem', color: COLORS.muted, letterSpacing: '0.2em', marginBottom: '0.6rem' }}>
              全履歴 / {photos.length} 回
            </div>
            {[...photos].reverse().map((p, i) => {
              const days = daysSince(p.date);
              return (
                <div key={p.date + i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.5rem 0', borderTop: i === 0 ? 'none' : `1px dashed ${COLORS.border}`, fontSize: '0.78rem' }}>
                  <span className="mono" style={{ color: COLORS.text, letterSpacing: '0.1em' }}>{p.date}</span>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.7rem' }}>
                    <span className="mono" style={{ color: COLORS.faint, fontSize: '0.7rem' }}>{days === 0 ? '今日' : `${days}日前`}</span>
                    <button onClick={() => removePhoto(p.date)}
                      style={{ background: 'transparent', border: 'none', color: COLORS.faint, cursor: 'pointer', fontSize: '0.85rem', padding: '0 0.3rem' }}
                      title="削除">×</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ======= WEALTH VIEW =======
function WealthView({ state, setState }) {
  const [expandedMonth, setExpandedMonth] = useState(null);
  const month = monthStr();
  const m = state.monthly?.[month] || {};

  const updateMonth = (key, value, targetMonth = month) => {
    setState(prev => ({
      ...prev,
      monthly: {
        ...prev.monthly,
        [targetMonth]: { ...prev.monthly?.[targetMonth], [key]: value }
      }
    }));
  };

  const checks = [
    { key: 'nisa', label: '新NISA' },
    { key: 'ideco', label: 'iDeCo' },
    { key: 'kyousai', label: '小規模企業共済' },
    { key: 'btcReview', label: 'BTC ポジション確認' },
    { key: 'satReview', label: 'サテライト棚卸し' },
  ];

  const calcProgress = (data) => checks.filter(c => data?.[c.key]).length;
  const progress = calcProgress(m);

  // Past months history (excluding current)
  const pastMonths = useMemo(() => {
    return Object.entries(state.monthly || {})
      .filter(([k]) => k !== month)
      .sort(([a], [b]) => b.localeCompare(a))
      .map(([k, data]) => ({
        month: k,
        data,
        progress: calcProgress(data),
        hasNotes: !!(data.notes && data.notes.trim()),
      }));
  }, [state.monthly, month]);

  return (
    <div style={{ padding: '1.5rem 1.25rem 0' }}>
      <div className="mono" style={{ fontSize: '0.65rem', letterSpacing: '0.3em', color: COLORS.muted, marginBottom: '0.4rem' }}>
        LIFE OS — WEALTH
      </div>
      <div className="serif" style={{ fontSize: '2rem', letterSpacing: '0.04em', fontWeight: 500, marginBottom: '1.5rem' }}>
        投資の記録
      </div>

      {/* Current month progress */}
      <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, padding: '1.25rem', marginBottom: '1.5rem' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '0.85rem' }}>
          <div className="mono" style={{ fontSize: '0.65rem', letterSpacing: '0.25em', color: COLORS.muted }}>{month} 進捗</div>
          <div className="serif" style={{ fontSize: '1.3rem', fontWeight: 500, color: COLORS.accent }}>{progress}/{checks.length}</div>
        </div>
        <div style={{ height: '3px', background: COLORS.border, position: 'relative' }}>
          <div style={{ position: 'absolute', top: 0, left: 0, height: '100%', width: `${(progress / checks.length) * 100}%`, background: COLORS.accent, transition: 'width 0.6s ease' }} />
        </div>
      </div>

      {/* Current month checklist */}
      <SectionLabel>今月のチェックリスト</SectionLabel>
      <div style={{ marginBottom: '1.5rem' }}>
        {checks.map((c, i) => (
          <button
            key={c.key}
            onClick={() => updateMonth(c.key, !m[c.key])}
            style={{
              width: '100%',
              background: m[c.key] ? COLORS.surface2 : COLORS.surface,
              border: `1px solid ${m[c.key] ? COLORS.accentDim : COLORS.border}`,
              padding: '1rem 1.1rem',
              marginBottom: '0.4rem',
              textAlign: 'left',
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              gap: '0.85rem',
              color: COLORS.text,
              WebkitTapHighlightColor: 'transparent',
            }}
          >
            <div style={{
              width: '28px', height: '28px',
              background: m[c.key] ? COLORS.accent : 'transparent',
              border: `1px solid ${m[c.key] ? COLORS.accent : COLORS.border}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0,
              color: COLORS.bg,
            }}>
              {m[c.key] && <Check size={14} strokeWidth={2.5} />}
            </div>
            <div style={{ flex: 1, fontSize: '0.92rem', fontWeight: 500, opacity: m[c.key] ? 0.6 : 1, textDecoration: m[c.key] ? 'line-through' : 'none', textDecorationColor: COLORS.muted }}>
              {c.label}
            </div>
          </button>
        ))}
      </div>

      {/* Current month notes */}
      <SectionLabel>{month} メモ</SectionLabel>
      <textarea
        value={m.notes || ''}
        onChange={(e) => updateMonth('notes', e.target.value)}
        placeholder="..."
        rows={4}
        style={{
          width: '100%',
          background: COLORS.surface,
          border: `1px solid ${COLORS.border}`,
          color: COLORS.text,
          padding: '1rem',
          fontSize: '0.88rem',
          fontFamily: 'inherit',
          fontWeight: 300,
          lineHeight: 1.7,
          resize: 'vertical',
          marginBottom: '2rem',
        }}
      />

      {/* Past months history */}
      <SectionLabel>月別履歴</SectionLabel>
      <div style={{ marginBottom: '2rem' }}>
        {pastMonths.length === 0 ? (
          <div style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, padding: '1.25rem', fontSize: '0.85rem', color: COLORS.faint, textAlign: 'center' }}>
            記録蓄積中
          </div>
        ) : (
          pastMonths.map(pm => {
            const isExpanded = expandedMonth === pm.month;
            const isComplete = pm.progress === checks.length;
            return (
              <div key={pm.month} style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, marginBottom: '0.4rem', overflow: 'hidden' }}>
                <button onClick={() => setExpandedMonth(isExpanded ? null : pm.month)}

                    width: '100%',
                    background: 'transparent',
                    border: 'none',
                    padding: '0.9rem 1.1rem',

                    display: 'flex',
                    alignItems: 'center',
                    gap: '1rem',
                    color: COLORS.text,
                    WebkitTapHighlightColor: 'transparent',

                  <div className="mono" style={{ fontSize: '0.78rem', color: COLORS.accent, letterSpacing: '0.15em', minWidth: '4.5rem', textAlign: 'left' }}>
                    {pm.month}
                  </div>
                  <div className="serif" style={{ fontSize: '1rem', fontWeight: 500, color: isComplete ? COLORS.good : COLORS.text }}>
                    {pm.progress}<span style={{ fontSize: '0.7rem', color: COLORS.muted, margin: '0 0.15rem' }}>/</span><span style={{ fontSize: '0.85rem', color: COLORS.muted }}>{checks.length}</span>

                  {pm.hasNotes && <span className="mono" style={{ fontSize: '0.6rem', color: COLORS.muted, letterSpacing: '0.15em' }}>MEMO</span>}
                  <div style={{ flex: 1 }} />
                  <span style={{ color: COLORS.muted, fontSize: '0.85rem', transform: isExpanded ? 'rotate(90deg)' : 'rotate(0)', transition: 'transform 0.2s' }}>›</span>
                </button>
                {isExpanded && (
                  <div style={{ padding: '0 1.1rem 1.1rem', borderTop: `1px solid ${COLORS.border}` }}>
                    <div style={{ marginTop: '0.85rem' }}>
                      {checks.map(c => (
                        <button key={c.key}
                          onClick={() => updateMonth(c.key, !pm.data[c.key], pm.month)}
                          style={{
                            display: 'flex', alignItems: 'center', gap: '0.6rem',
                            padding: '0.5rem 0',
                            width: '100%',
                            background: 'transparent',
                            border: 'none',
                            color: COLORS.text,
                            cursor: 'pointer',
                            fontSize: '0.85rem',
                            textAlign: 'left',
                            WebkitTapHighlightColor: 'transparent',
                          }}>
                          <div style={{
                            width: '20px', height: '20px',
                            background: pm.data[c.key] ? COLORS.accent : 'transparent',
                            border: `1px solid ${pm.data[c.key] ? COLORS.accent : COLORS.border}`,
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                            flexShrink: 0,
                            color: COLORS.bg,
                          }}>
                            {pm.data[c.key] && <Check size={11} strokeWidth={2.5} />}
                          </div>
                          <span style={{ opacity: pm.data[c.key] ? 0.7 : 1 }}>{c.label}</span>
                        </button>
                      ))}
                    </div>
                    {pm.hasNotes && (
                      <div style={{ marginTop: '0.85rem', paddingTop: '0.85rem', borderTop: `1px dashed ${COLORS.border}` }}>
                        <div className="mono" style={{ fontSize: '0.6rem', color: COLORS.muted, letterSpacing: '0.2em', marginBottom: '0.4rem' }}>MEMO</div>
                        <textarea
                          value={pm.data.notes || ''}
                          onChange={(e) => updateMonth('notes', e.target.value, pm.month)}
                          rows={3}
                          style={{
                            width: '100%',
                            background: COLORS.bg,
                            border: `1px solid ${COLORS.border}`,
                            color: COLORS.text,
                            padding: '0.7rem',
                            fontSize: '0.82rem',
                            fontFamily: 'inherit',
                            fontWeight: 300,
                            lineHeight: 1.6,
                            resize: 'vertical',
                          }}
                        />
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

    <button onClick={onClick} style={{

function DataModal({ mode, state, setState, onClose }) {
  const [importText, setImportText] = useState('');
  const [confirmReset, setConfirmReset] = useState(false);
  const [copyStatus, setCopyStatus] = useState('');
  const exportText = JSON.stringify(state, null, 2);

  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(exportText);
      setCopyStatus('コピーしました ✓');
      setState(prev => ({ ...prev, lastExport: todayStr() }));
      setTimeout(() => setCopyStatus(''), 2500);
    } catch (e) {
      setCopyStatus('コピー失敗 — 手動で選択してください');
    }
  };

  const handleDownload = () => {
    try {
      const blob = new Blob([exportText], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `life-os-${todayStr()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      setState(prev => ({ ...prev, lastExport: todayStr() }));
      setCopyStatus('ダウンロード ✓');
      setTimeout(() => setCopyStatus(''), 2500);
    } catch (e) {
      setCopyStatus('ダウンロード失敗');
    }
  };

  const handleImport = () => {
    try {
      const parsed = JSON.parse(importText);
      if (typeof parsed !== 'object' || parsed === null) throw new Error('Invalid');
      if (!confirm('現在のデータが上書きされます。よろしいですか？')) return;
      setState({ ...defaultState, ...parsed });
      onClose();
    } catch (e) {
      alert('JSONとして無効です。フォーマットを確認してください。');
    }
  };

  const handleReset = () => {
    setState(defaultState);
    onClose();
  };

  return (
    <>
      <div onClick={onClose} style={{
        position: 'fixed', inset: 0,
        background: 'rgba(0,0,0,0.7)', backdropFilter: 'blur(4px)', WebkitBackdropFilter: 'blur(4px)',
        zIndex: 200, animation: 'fadeIn 0.2s ease',
      }} />
      <div style={{
        position: 'fixed', bottom: 0, left: 0, right: 0,
        maxHeight: '85vh',
        background: COLORS.bg,
        borderTop: `1px solid ${COLORS.border}`,
        zIndex: 201, overflowY: 'auto',
        padding: '0 1.25rem 6rem',
        animation: 'slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1)',
      }}>
        <div style={{
          position: 'sticky', top: 0, background: COLORS.bg,
          padding: '1rem 0', marginBottom: '1.25rem',
          borderBottom: `1px solid ${COLORS.border}`,
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        }}>
          <div className="serif" style={{ fontSize: '1.4rem', fontWeight: 500 }}>
            {mode === 'export' && 'データ書き出し'}
            {mode === 'import' && 'データ読み込み'}
            {mode === 'reset' && '全データ削除'}
          </div>
          <button onClick={onClose} style={{
            background: 'transparent', border: `1px solid ${COLORS.border}`, color: COLORS.muted,
            padding: '0.5rem 0.85rem', cursor: 'pointer', fontFamily: 'JetBrains Mono, monospace',
            fontSize: '0.7rem', letterSpacing: '0.18em',
          }}>閉じる</button>
        </div>

        {mode === 'export' && (
          <div>
            <div style={{ fontSize: '0.85rem', color: COLORS.muted, lineHeight: 1.7, marginBottom: '1rem' }}>
              下のJSONをコピーまたはダウンロードして、メール下書き・メモアプリ・クラウドに保管しておくことで、いつでも復元できます。
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.5rem', marginBottom: '1rem' }}>
              <button onClick={handleCopy} style={btnStyle(COLORS.accent)}>クリップボードにコピー</button>
              <button onClick={handleDownload} style={btnStyle(COLORS.text, true)}>ファイル保存</button>
            </div>
            {copyStatus && (
              <div className="mono" style={{ fontSize: '0.75rem', color: COLORS.good, letterSpacing: '0.15em', marginBottom: '1rem' }}>
                {copyStatus}
              </div>
            )}
            <textarea
              value={exportText}
              readOnly
              rows={12}
              style={textareaStyle}
              onClick={(e) => e.target.select()}
            />
            <div className="mono" style={{ fontSize: '0.65rem', color: COLORS.faint, marginTop: '0.5rem', letterSpacing: '0.1em' }}>
              {(exportText.length / 1024).toFixed(2)} KB · {Object.keys(state.daily || {}).length} 日記録
            </div>
          </div>
        )}

        {mode === 'import' && (
          <div>
            <div style={{ fontSize: '0.85rem', color: COLORS.muted, lineHeight: 1.7, marginBottom: '1rem' }}>
              以前エクスポートしたJSONを下に貼り付けて「読込」を押してください。<strong style={{ color: COLORS.warn }}>現在のデータは上書きされます。</strong>
            </div>
            <textarea
              value={importText}
              onChange={(e) => setImportText(e.target.value)}
              placeholder='{"daily": {...}, "aga": {...}, ...}'
              rows={12}
              style={textareaStyle}
            />
            <button
              onClick={handleImport}
              disabled={!importText.trim()}
              style={{ ...btnStyle(COLORS.accent), marginTop: '1rem', opacity: importText.trim() ? 1 : 0.4, cursor: importText.trim() ? 'pointer' : 'not-allowed' }}>
              データを読み込む
            </button>
          </div>
        )}

        {mode === 'reset' && (
          <div>
            <div style={{ fontSize: '0.92rem', color: COLORS.text, lineHeight: 1.8, marginBottom: '1.5rem' }}>
              <strong style={{ color: COLORS.warn, fontSize: '1rem' }}>⚠ 警告</strong><br />
              すべての日次記録、AGAロードマップ進捗、月次データ、レビュー、写真ログ、ノートが削除されます。<br /><br />
              この操作は<strong style={{ color: COLORS.warn }}>取り消せません</strong>。実行する前にエクスポートしてバックアップを取ることを強く推奨。
            </div>
            <button onClick={() => setConfirmReset(true)} style={btnStyle(COLORS.warn)} disabled={confirmReset}>
              {confirmReset ? '本当に削除しますか？' : '削除する...'}
            </button>
            {confirmReset && (
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.5rem', marginTop: '1rem' }}>
                <button onClick={handleReset} style={btnStyle(COLORS.warn)}>はい、すべて削除</button>
                <button onClick={() => setConfirmReset(false)} style={btnStyle(COLORS.text, true)}>キャンセル</button>
              </div>
            )}
          </div>
        )}
      </div>
      <style>{`
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      `}</style>
    </>
  );
}

  background: outline ? 'transparent' : color,
  color: outline ? color : COLORS.bg,
  border: `1px solid ${color}`,
  padding: '0.85rem 1rem',
  cursor: 'pointer',
  fontFamily: 'JetBrains Mono, monospace',
  fontSize: '0.78rem',
  letterSpacing: '0.18em',
  textTransform: 'uppercase',

  padding: '1rem',
  fontSize: '0.78rem',
