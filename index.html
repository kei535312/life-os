<style>
  html, body { margin: 0; padding: 0; background: #F2EEE3; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
  body { padding-top: env(safe-area-inset-top); }

<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef } = React;

const Settings = ({size=18}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>);
const X = ({size=18}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>);
const Download = ({size=18}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>);
const Upload = ({size=18}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>);

const STORAGE_KEY = 'lifeOS:state:v1';
const UK_DEPARTURE = '2027-04-01';

const C = {
  paper: '#F2EEE3',
  ink: '#23221D',
  inkSoft: '#736E62',
  inkFaint: '#ABA595',
  line: '#DAD4C5',
  lineSoft: '#E5E0D2',
  accent: '#8C3A2B',
};

const pad = (n) => String(n).padStart(2, '0');
const fmt = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
const todayStr = () => fmt(new Date());
const dayJP = (d) => ['日', '月', '火', '水', '木', '金', '土'][d.getDay()] + '曜日';
const daysUntilUK = () => {
  const t = new Date(UK_DEPARTURE + 'T00:00:00');
  const n = new Date(todayStr() + 'T00:00:00');
  return Math.ceil((t - n) / 86400000);
};

function migrate(parsed) {
  if (parsed && parsed.dailyMemos) return { ...defaultState, ...parsed, dailyMemos: parsed.dailyMemos };
  const dm = {};
  if (parsed && Array.isArray(parsed.memos)) {
    for (const m of parsed.memos) {
      try {
        const k = fmt(new Date(m.createdAt));
        dm[k] = dm[k] ? { text: dm[k].text + '\n' + m.text } : { text: m.text };
      } catch (e) {}
    }
  }
  if (parsed && parsed.daily) {
    for (const [k, v] of Object.entries(parsed.daily)) {
      const j = (v && v.journal || '').trim();
      if (j && !dm[k]) dm[k] = { text: j };
    }
  }
  return { ...defaultState, dailyMemos: dm };
}

const defaultState = { dailyMemos: {} };

function LifeOS() {
  const [state, setState] = useState(defaultState);
  const [view, setView] = useState('today');
  const [loaded, setLoaded] = useState(false);
  const [dataOpen, setDataOpen] = useState(false);

  useEffect(() => {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) setState(migrate(JSON.parse(stored)));
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    const t = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      catch (e) {}
    }, 250);
    return () => clearTimeout(t);
  }, [state, loaded]);

  if (!loaded) return <div style={{ background: C.paper, minHeight: '100vh' }} />;

  return (
    <div style={{ background: C.paper, color: C.ink, minHeight: '100vh', paddingBottom: '5rem', fontFamily: '"Zen Old Mincho", serif', fontWeight: 400, WebkitFontSmoothing: 'antialiased' }}>
      <FontImport />
      <div style={{ maxWidth: '600px', margin: '0 auto' }}>
        {view === 'today' && <TodayView state={state} setState={setState} openData={() => setDataOpen(true)} />}
        {view === 'archive' && <ArchiveView state={state} setState={setState} />}
      </div>
      <BottomNav view={view} setView={setView} />
      {dataOpen && <DataModal state={state} setState={setState} onClose={() => setDataOpen(false)} />}
    </div>
  );
}

function FontImport() {
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap');
      * { box-sizing: border-box; }
      body { margin: 0; }
      input, textarea, button { font-family: inherit; }
      input:focus, textarea:focus { outline: none; }
      .sans { font-family: 'Zen Kaku Gothic New', sans-serif; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: ${C.line}; }
      ::selection { background: #E4D9C2; }
      textarea::placeholder { color: ${C.inkFaint}; }
    `}</style>
  );
}

// ======= TODAY — a page in a notebook =======
function TodayView({ state, setState, openData }) {
  const today = todayStr();
  const d = new Date();
  const left = daysUntilUK();
  const memos = state.dailyMemos || {};
  const text = memos[today]?.text || '';

  const setMemo = (val) => {
    setState((prev) => {
      const dm = { ...(prev.dailyMemos || {}) };
      if (val.trim().length === 0) delete dm[today];
      else dm[today] = { text: val };
      return { ...prev, dailyMemos: dm };
    });
  };

  return (
    <div style={{ padding: '2.4rem 1.6rem 0', position: 'relative' }}>
      <button onClick={openData} style={{ position: 'absolute', top: '1.6rem', right: '1.3rem', background: 'transparent', border: 'none', color: C.inkFaint, cursor: 'pointer', padding: '0.3rem', WebkitTapHighlightColor: 'transparent' }}>
        <Settings size={16} />
      </button>

      {/* date — written like the top of a page */}
      <div style={{ fontSize: '1.35rem', fontWeight: 500, letterSpacing: '0.04em', marginBottom: '0.55rem' }}>
        {d.getFullYear()}年{d.getMonth() + 1}月{d.getDate()}日
        <span style={{ fontSize: '0.95rem', color: C.inkSoft, marginLeft: '0.5rem' }}>{dayJP(d)}</span>
      </div>
      {/* london — a quiet note in the margin */}
      <div style={{ fontSize: '0.82rem', color: C.inkSoft, marginBottom: '1.9rem', letterSpacing: '0.03em' }}>
        ロンドンまで、あと{left}日。
      </div>

      <div style={{ height: '1px', background: C.line, marginBottom: '1.6rem' }} />

      {/* the page — grows as you write */}
      <textarea
        value={text}
        onChange={(e) => setMemo(e.target.value)}
        placeholder="　"
        rows={Math.max(13, text.split('\n').length + 3)}
        style={{
          width: '100%',
          background: 'transparent',
          border: 'none',
          color: C.ink,
          padding: 0,
          fontSize: '1.02rem',
          fontWeight: 400,
          lineHeight: 2.15,
          resize: 'none',
          fontFamily: '"Zen Old Mincho", serif',
        }}
      />
    </div>
  );
}

// ======= ARCHIVE — flipping back through the notebook =======
function ArchiveView({ state, setState }) {
  const memos = state.dailyMemos || {};
  const [openKey, setOpenKey] = useState(null);

  const byMonth = useMemo(() => {
    const keys = Object.keys(memos).filter((k) => (memos[k]?.text || '').trim().length > 0).sort().reverse();
    const g = {};
    for (const k of keys) {
      const mk = k.slice(0, 7);
      (g[mk] = g[mk] || []).push(k);
    }
    return Object.entries(g).sort((a, b) => b[0].localeCompare(a[0]));
  }, [memos]);

  const empty = byMonth.length === 0;

  const setMemo = (key, val) => {
    setState((prev) => {
      const dm = { ...(prev.dailyMemos || {}) };
      if (val.trim().length === 0) delete dm[key];
      else dm[key] = { text: val };
      return { ...prev, dailyMemos: dm };
    });
  };

  return (
    <div style={{ padding: '2.4rem 1.6rem 0' }}>
      {empty ? (
        <div style={{ color: C.inkFaint, fontSize: '1rem', lineHeight: 2, paddingTop: '1rem' }}>
          まだ何もない。
        </div>
      ) : (
        byMonth.map(([mk, keys]) => {
          const [y, m] = mk.split('-');
          return (
            <div key={mk} style={{ marginBottom: '2.6rem' }}>
              <div style={{ fontSize: '0.92rem', color: C.inkSoft, fontWeight: 500, letterSpacing: '0.05em', marginBottom: '1.3rem' }}>
                {y}年 {parseInt(m)}月
              </div>
              {keys.map((k) => (
                <Entry key={k} dateKey={k} text={memos[k].text} open={openKey === k}
                  onToggle={() => setOpenKey(openKey === k ? null : k)}
                  onChange={(v) => setMemo(k, v)} />
              ))}
            </div>
          );
        })
      )}
      <div style={{ height: '1.5rem' }} />
    </div>
  );
}

function Entry({ dateKey, text, open, onToggle, onChange }) {
  const d = new Date(dateKey + 'T00:00:00');
  const [editing, setEditing] = useState(false);

  const close = () => { setEditing(false); onToggle(); };

  return (
    <div style={{ marginBottom: '1.7rem' }}>
      <div onClick={open ? close : onToggle} style={{ fontSize: '0.86rem', color: C.inkSoft, marginBottom: '0.5rem', cursor: 'pointer', letterSpacing: '0.03em', WebkitTapHighlightColor: 'transparent' }}>
        {d.getMonth() + 1}月{d.getDate()}日 <span style={{ color: C.inkFaint }}>{dayJP(d)}</span>
      </div>
      {open ? (
        <div>
          {editing ? (
            <textarea
              value={text}
              onChange={(e) => onChange(e.target.value)}
              autoFocus
              rows={Math.max(6, text.split('\n').length + 2)}
              style={{ width: '100%', background: 'transparent', border: 'none', borderLeft: `2px solid ${C.line}`, color: C.ink, padding: '0 0 0 1rem', fontSize: '1rem', fontWeight: 400, lineHeight: 2.1, resize: 'none', fontFamily: '"Zen Old Mincho", serif' }}
            />
          ) : (
            /* read first — touch the text to edit */
            <div onClick={() => setEditing(true)} style={{ fontSize: '1rem', color: C.ink, fontWeight: 400, lineHeight: 2.1, whiteSpace: 'pre-wrap', wordBreak: 'break-word', cursor: 'text' }}>
              {text}
            </div>
          )}
          <div onClick={close} className="sans" style={{ fontSize: '0.72rem', color: C.inkFaint, marginTop: '0.7rem', cursor: 'pointer', letterSpacing: '0.08em' }}>
            とじる
          </div>
        </div>
      ) : (
        <div onClick={onToggle} style={{
          fontSize: '1rem', color: C.ink, fontWeight: 400, lineHeight: 2.0,
          whiteSpace: 'pre-wrap', maxHeight: '4em', overflow: 'hidden', wordBreak: 'break-word', cursor: 'pointer',
          WebkitMaskImage: 'linear-gradient(180deg,#000 45%,transparent 100%)',
          maskImage: 'linear-gradient(180deg,#000 45%,transparent 100%)',
        }}>
          {text}
        </div>
      )}
    </div>
  );
}

// ======= DATA =======
function DataModal({ state, setState, onClose }) {
  const [mode, setMode] = useState(null);
  const [importText, setImportText] = useState('');
  const [status, setStatus] = useState('');
  const json = JSON.stringify(state, null, 2);

  const copy = async () => {
    try { await navigator.clipboard.writeText(json); setStatus('コピーした'); }
    catch (e) { setStatus('手動で選択を'); }
    setTimeout(() => setStatus(''), 2000);
  };
  const download = () => {
    const b = new Blob([json], { type: 'application/json' });
    const u = URL.createObjectURL(b);
    const a = document.createElement('a');
    a.href = u; a.download = `life-os-${todayStr()}.json`; a.click();
    URL.revokeObjectURL(u);
  };
  const doImport = () => {
    try { setState(migrate(JSON.parse(importText))); setStatus('読み込んだ'); setTimeout(onClose, 700); }
    catch (e) { setStatus('JSONが不正'); }
  };

  return (
    <div onClick={onClose} className="sans" style={{ position: 'fixed', inset: 0, background: 'rgba(35,34,29,0.3)', zIndex: 200, display: 'flex', alignItems: 'flex-end', justifyContent: 'center' }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.paper, borderTop: `1px solid ${C.line}`, width: '100%', maxWidth: '600px', padding: '1.6rem 1.6rem max(1.6rem, env(safe-area-inset-bottom))', maxHeight: '88vh', overflowY: 'auto' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1.4rem' }}>
          <div style={{ fontSize: '1.05rem', fontWeight: 500, fontFamily: '"Zen Old Mincho", serif' }}>データ</div>
          <button onClick={onClose} style={{ background: 'transparent', border: 'none', color: C.inkSoft, cursor: 'pointer', padding: '0.2rem' }}><X size={19} /></button>
        </div>

        {!mode && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.4rem' }}>
            <Row icon={<Download size={15} />} label="エクスポート（バックアップ・移行）" onClick={() => setMode('export')} />
            <Row icon={<Upload size={15} />} label="インポート（復元）" onClick={() => setMode('import')} />
          </div>
        )}

        {mode === 'export' && (
          <div>
            <div style={{ fontSize: '0.8rem', color: C.inkSoft, marginBottom: '1rem', lineHeight: 1.8 }}>端末を変えるとき・GitHub版を更新するときはコピーして新しい方でインポート。</div>
            <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1rem' }}>
              <button onClick={copy} style={{ ...btn(false), flex: 1 }}>コピー</button>
              <button onClick={download} style={{ ...btn(true), flex: 1 }}>ダウンロード</button>
            </div>
            <textarea readOnly value={json} rows={6} style={ta()} />
            <Back onBack={() => setMode(null)} status={status} />
          </div>
        )}
        {mode === 'import' && (
          <div>
            <div style={{ fontSize: '0.8rem', color: C.inkSoft, marginBottom: '1rem', lineHeight: 1.8 }}>JSONを貼り付けて読み込む。今のデータは上書きされる。</div>
            <textarea value={importText} onChange={(e) => setImportText(e.target.value)} placeholder="JSONを貼り付け..." rows={6} style={ta()} />
            <button onClick={doImport} disabled={!importText.trim()} style={{ ...btn(false), width: '100%', marginTop: '0.8rem', opacity: importText.trim() ? 1 : 0.4 }}>読み込む</button>
            <Back onBack={() => setMode(null)} status={status} />
          </div>
        )}
      </div>
    </div>
  );
}

function ta() { return { width: '100%', background: '#FBF9F2', border: `1px solid ${C.line}`, color: C.inkSoft, padding: '0.7rem', fontSize: '0.66rem', fontFamily: 'monospace', lineHeight: 1.5, resize: 'vertical' }; }
function btn(ghost) {
  return { background: ghost ? 'transparent' : C.ink, color: ghost ? C.ink : C.paper, border: `1px solid ${C.ink}`, padding: '0.65rem 1rem', fontSize: '0.8rem', cursor: 'pointer', fontWeight: 500, fontFamily: '"Zen Kaku Gothic New", sans-serif', WebkitTapHighlightColor: 'transparent' };
}
function Row({ icon, label, onClick }) {
  return (
    <button onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: '0.8rem', background: 'transparent', border: `1px solid ${C.line}`, color: C.ink, padding: '0.95rem 1rem', cursor: 'pointer', textAlign: 'left', fontSize: '0.86rem', fontFamily: '"Zen Kaku Gothic New", sans-serif', WebkitTapHighlightColor: 'transparent' }}>
      <span style={{ color: C.inkSoft }}>{icon}</span>{label}
    </button>
  );
}
function Back({ onBack, status }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginTop: '0.9rem' }}>
      <button onClick={onBack} style={{ background: 'transparent', border: 'none', color: C.inkSoft, cursor: 'pointer', fontSize: '0.78rem', padding: '0.2rem 0', fontFamily: '"Zen Kaku Gothic New", sans-serif' }}>もどる</button>
      {status && <span style={{ fontSize: '0.72rem', color: C.accent }}>{status}</span>}
    </div>
  );
}

// ======= NAV =======
function BottomNav({ view, setView }) {
  const items = [{ id: 'today', label: '今日' }, { id: 'archive', label: 'これまで' }];
  return (
    <nav style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: 'rgba(242,238,227,0.92)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)', display: 'flex', justifyContent: 'center', gap: '2.8rem', padding: '1rem 0 max(1rem, env(safe-area-inset-bottom, 1rem))', zIndex: 100 }}>
      {items.map((item) => {
        const active = view === item.id;
        return (
          <button key={item.id} onClick={() => setView(item.id)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: '0.2rem 0.4rem', fontSize: '0.95rem', fontWeight: active ? 500 : 400, color: active ? C.ink : C.inkFaint, fontFamily: '"Zen Old Mincho", serif', letterSpacing: '0.08em', WebkitTapHighlightColor: 'transparent', borderBottom: active ? `1px solid ${C.ink}` : '1px solid transparent', paddingBottom: '0.2rem' }}>
            {item.label}
          </button>
        );
      })}
    </nav>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<LifeOS />);
</script>
</body>
</html>
